name: Build macOS App

on:
  workflow_dispatch:  # Manual trigger from GitHub UI or CLI
  push:
    branches: [master]

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 requests pyinstaller

      - name: Install p7zip
        run: brew install p7zip

      - name: Prepare bundled 7z
        run: |
          mkdir -p 7z
          cp $(which 7za) 7z/7za
          chmod +x 7z/7za

      - name: Build with PyInstaller
        run: python -m PyInstaller LemonUnlocker_mac.spec --clean --noconfirm

      - name: Test App Launch (Smoke Test)
        run: |
          ./dist/LemonUnlocker.app/Contents/MacOS/LemonUnlocker --test-launch
          echo "App launched successfully!"

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R dist/LemonUnlocker.app dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "LemonUnlocker" -srcfolder dmg_contents -ov -format UDZO LemonUnlocker.dmg

      - name: Upload .app as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LemonUnlocker-macOS
          path: dist/LemonUnlocker.app
          retention-days: 30

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LemonUnlocker-macOS-DMG
          path: LemonUnlocker.dmg
          retention-days: 30
